name: Build APK

on:
  push:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: alpine:latest

    steps:
    - run: apk add alpine-sdk abuild sudo

    - uses: actions/checkout@v4

    - run: |
        chmod +x bandix-page.post-install
        chmod +x bandix-page.post-deinstall

    - run: |
        adduser -D builder
        addgroup builder abuild
        echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers

    - run: |
        mkdir -p /home/builder/.abuild
        chown -R builder:builder /home/builder
        sudo -u builder abuild-keygen -a -n

    - run: |
        chown -R builder:builder .
        sudo -u builder sh -c "abuild -rK -F || true"

    - run: |
        mkdir -p /tmp/artifacts
        find /home/builder/packages -name "*.apk" -exec cp {} /tmp/artifacts/ \;

    - uses: actions/upload-artifact@v4
      with:
        name: bandix-page-apk
        path: /tmp/artifacts/*.apk
