<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#020617">

<title>Usage</title>

<style>
/* base container */
#statusDot {
  display: inline-block;
}

/* shared dot size */
.status-dot-green,
.status-dot-red {
  width: 14px;
  height: 14px;
  border-radius: 50%;
}

body.paused * {
  animation-play-state: paused !important;
}

/* 🟢 green pulsing */
.status-dot-green {
  background: #22c55e;
  animation: pulseGreen 1.6s infinite;
}

/* 🔴 red static */
.status-dot-red {
  background: #ef4444;
}

/* smooth glow pulse */
@keyframes pulseGreen {
  0% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(34,197,94,0.7);
  }
  70% {
    transform: scale(1.1);
    box-shadow: 0 0 10px 6px rgba(34,197,94,0);
  }
  100% {
    transform: scale(1);
    box-shadow: 0 0 0 0 rgba(34,197,94,0);
  }
}

body {
  background: radial-gradient(circle at top left, #0f172a, #020617 70%);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
  margin: 0;
  min-height: 100dvh;
  font-size: 18px;

  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100px;
  pointer-events: none;
  background: radial-gradient(circle, rgba(59,130,246,0.08), transparent 70%);
}

html {
  background: #020617;
}

.container {
  padding:14px;
  max-width:600px;
  margin:auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

h2 {
  font-size: 24px;
  font-weight: 700;
  margin: 0;
  display: flex;
  align-items: center;
}

.admin-btn {
  background: rgba(30,41,59,0.6);
  padding: 12px 18px;
  border-radius: 12px;
  color: #60a5fa;
  text-decoration: none;
  font-size: 18px;
  font-weight: 600;
  border: 1px solid rgba(96,165,250,0.3);

  box-shadow:
    0 0 12px rgba(96,165,250,0.4),
    inset 0 0 6px rgba(255,255,255,0.05);

  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.admin-btn:hover {
  transform: translateY(-1px);
  box-shadow:
    0 0 20px rgba(96,165,250,0.6),
    inset 0 0 8px rgba(255,255,255,0.08);
}

.card {
  position: relative;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  background: rgba(15, 30, 60, 0.9);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 16px;

  border: 1px solid rgba(96,165,250,0.25);

  box-shadow:
    0 0 25px rgba(59,130,246,0.25),
    0 0 60px rgba(59,130,246,0.15),
    inset 0 0 15px rgba(255,255,255,0.04);
  -webkit-user-select: none;
  user-select: none;
  cursor: pointer;
}

.card::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: 18px;
  background: linear-gradient(
    120deg,
    rgba(59,130,246,0.6),
    rgba(168,85,247,0.4),
    rgba(59,130,246,0.6)
  );
  opacity: 0.25;
  filter: blur(8px);
  z-index: -1;
}

.user {
  font-size:22px;
  font-weight:bold;
  margin-bottom:6px;
}

.usage {
  font-size:20px;
  opacity:0.8;
}

.bar-bg {
  background: rgba(255,255,255,0.05);
  height: 26px;
  border-radius: 999px;
  margin-top: 10px;
  overflow: hidden;
}

.bar-fill {
  box-shadow: 0 0 10px rgba(255,255,255,0.2);
  background-blend-mode: overlay;
  position: relative;
  overflow: hidden;
  height: 100%;
  border-radius: 999px;
  font-size: 14px;
  font-weight: bold;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #000;
  transition: width 0.4s ease;
}

.bar-fill::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    110deg,
    transparent 30%,
    rgba(255,255,255,0.2) 50%,
    transparent 70%
  );
  transform: translateX(-100%);
  animation: sweep 4.5s infinite;
}

@keyframes sweep {
  to {
    transform: translateX(100%);
  }
}

.card.active {
  transform: translateY(-4px) scale(1.01);
  box-shadow:
    0 0 40px rgba(59,130,246,0.45),
    0 0 80px rgba(59,130,246,0.25),
    inset 0 0 20px rgba(255,255,255,0.05);
}

.dot {
  display: inline-block;
}

.paid-box {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 16px;
  font-weight: 700;

  color: rgba(255,255,255,0.75);
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.05);

  box-shadow:
    inset 0 0 4px rgba(255,255,255,0.05);
}

@media (max-width:480px) {
  .container { padding:10px; }
  h2 { font-size:18px; }
  .user { font-size:18px; }
  .usage { font-size:14px; }
  .bar-bg { height:26px; }
  .bar-fill { line-height:18px; }
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <div>
    <h2>👥Traffic Status</h2>
    <div style="display:flex; align-items:center; gap:6px; font-size:15px; opacity:0.75; margin-top:4px;">
      <span id="statusDot"></span>
      <span id="statusTime"></span>
    </div>
  </div>

  <a href="/data/admin/" class="admin-btn">⚙ Admin</a>
</div>

<div id="list">Loading...</div>

</div>

<script>
const elements = {};
let lastDataText = '';

function toggleCard(div) {
  if (div.classList.contains('active')) {
    div.classList.remove('active');
  } else {
    document.querySelectorAll('.card.active')
      .forEach(c => c.classList.remove('active'));
    div.classList.add('active');
  }
}

async function load() {
  try {
    const usersRes = await fetch('/data/users.json?t=' + Date.now());
    const users = await usersRes.json();

    const payRes = await fetch('/data/users-pay.json?t=' + Date.now());
    let payData = {};

    try {
      payData = await payRes.json();
    } catch(e) {}

    const dataRes = await fetch('/data/bandix-buffer.json?t=' + Date.now());
    if (!dataRes.ok) throw new Error("HTTP " + dataRes.status);

    const text = await dataRes.text();

    if (!text || text.trim() === "") {
      document.getElementById('list').innerText = 'No data yet';
      return;
    }

    let json;
    try {
      json = JSON.parse(text);
      updateStatus(json.ts_ms || 0);
    } catch (e) {
      console.error("BAD JSON:", text);
      document.getElementById('list').innerText = 'Invalid data';
      return;
    }

    const snapshot = text + JSON.stringify(users) + JSON.stringify(payData.paid || {});

    if (snapshot === lastDataText) {
      document.body.classList.add('paused');
      return;
    }

    document.body.classList.remove('paused');
    lastDataText = snapshot;

    let devices = Array.isArray(json.devices) ? json.devices : [];

    devices = devices.filter(d =>
      d.ip &&
      !d.ip.endsWith(".1") &&
      d.mac
    );

    let grouped = {};
    let lastSeen = {};

    devices.forEach(d => {
      const mac = d.mac.toLowerCase();

      const rx = Number(d.wan_rx_bytes || 0);
      const tx = Number(d.wan_tx_bytes || 0);

      if (!grouped[mac]) grouped[mac] = 0;
      grouped[mac] += rx + tx;

      if (!lastSeen[mac] || d.last_online_ts > lastSeen[mac]) {
        lastSeen[mac] = d.last_online_ts;
      }
    });

    const multiplier = users._multiplier || 1;

    let userList = [];
    let totalQuota = 0;

    for (let user in users) {
      if (user === "_multiplier" || user.startsWith("_")) continue;

      let totalBytes = 0;
      let macs = users[user].macs || [];
      let latestSeen = 0;

      macs.forEach(mac => {
        const m = mac.toLowerCase();

        totalBytes += grouped[m] || 0;

        if (lastSeen[m] && lastSeen[m] > latestSeen) {
          latestSeen = lastSeen[m];
        }
      });

      const quota = users[user].quota ?? 1;
      totalQuota += quota;

      userList.push({
        name: user,
        totalBytes,
        lastSeen: latestSeen
      });
    }

    userList.sort((a, b) => b.totalBytes - a.totalBytes);

    const list = document.getElementById('list');
    if (list.textContent.includes('Loading')) {
      list.textContent = '';
    }

    let grandTotalGB = 0;

    userList.forEach(entry => {
      const user = entry.name;

      const now = Date.now();
      const isOnline = entry.lastSeen && (now - entry.lastSeen <= 45000);
      const dotClass = isOnline ? 'status-dot-green' : 'status-dot-red';
      const statusText = isOnline ? 'Online' : 'Offline';

      const totalGB = (entry.totalBytes / 1e9) * multiplier;
      grandTotalGB += totalGB;

      const quota = users[user].quota ?? 1;

      let percent = quota > 0 ? (totalGB / quota) * 100 : (totalGB > 0 ? 100 : 0);
      if (percent > 100) percent = 100;

      const over = totalGB > quota;

      let color = 'linear-gradient(90deg, #16a34a, #4ade80)';
      if (percent > 70) color = 'linear-gradient(90deg, #facc15, #f97316)';
      if (percent > 90) color = 'linear-gradient(90deg, #ef4444, #b91c1c)';

      if (!elements[user]) {
        const div = document.createElement('div');
        div.className = 'card';

        div.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleCard(div);
        });

        div.innerHTML = `
          <div class="user" style="display:flex; justify-content:space-between; align-items:center;">
            <span class="name"></span>
            <span style="display:flex; align-items:center; gap:8px; font-size:14px; opacity:0.85;">
              <span class="paid"></span>
              <span class="dot"></span>
              <span class="text"></span>
            </span>
          </div>

          <div class="usage"></div>

          <div class="bar-bg">
            <div class="bar-fill"></div>
          </div>
        `;

        list.appendChild(div);

        elements[user] = {
          card: div,
          name: div.querySelector('.name'),
          usage: div.querySelector('.usage'),
          bar: div.querySelector('.bar-fill'),
          dot: div.querySelector('.dot'),
          status: div.querySelector('.text'),
          paid: div.querySelector('.paid')
        };
      }

      const el = elements[user];

      el.name.textContent = `${user} ${over ? '🔴' : ''}`;

      el.paid.innerHTML = payData.paid && payData.paid[user]
        ? '<span class="paid-box">PAID</span>'
        : '';

      el.usage.textContent =
        `${totalGB.toFixed(2)} GB / ${quota} GB (${percent.toFixed(0)}%)`;

      el.bar.style.width = percent + '%';
      el.bar.style.background = color;
      el.bar.textContent = percent.toFixed(0) + '%';

      el.dot.className = `dot ${dotClass}`;
      el.status.textContent = statusText;
    });

    const currentUsers = new Set(userList.map(u => u.name));

    for (let user in elements) {
      if (!currentUsers.has(user)) {
        elements[user].card.remove();
        delete elements[user];
      }
    }

    const existingTotal = document.getElementById('totalCard');
    if (existingTotal) existingTotal.remove();

    const totalPercent = totalQuota > 0 ? (grandTotalGB / totalQuota) * 100 : 0;

    const totalDiv = document.createElement('div');
    totalDiv.id = 'totalCard';
    totalDiv.className = 'card';
    totalDiv.style.border = '1px solid rgba(96,165,250,0.5)';
    totalDiv.style.boxShadow = '0 0 20px rgba(96,165,250,0.4)';
    totalDiv.style.cursor = 'default';

    totalDiv.innerHTML = `
      <div class="user">📊 Total Traffic</div>
      <div class="usage">${grandTotalGB.toFixed(2)} GB / ${totalQuota} GB (${totalPercent.toFixed(0)}%)</div>
    `;

    const fragment = document.createDocumentFragment();

    userList.forEach(entry => {
      const el = elements[entry.name];
      fragment.appendChild(el.card);
    });

    fragment.appendChild(totalDiv);

    list.innerHTML = '';
    list.appendChild(fragment);

  } catch (e) {
    console.error("LOAD ERROR:", e);
    document.getElementById('list').innerText = 'Error loading data';
  }
}

function updateStatus(ts_ms) {
  const dot = document.getElementById('statusDot');
  const time = document.getElementById('statusTime');

  if (!dot || !time) return;

  if (!ts_ms) {
    dot.className = 'status-dot-red';
    time.innerHTML = '';
    return;
  }

  const now = Date.now();
  const diff = now - ts_ms;

  const TEN_MIN = 10 * 60 * 1000;

  const date = new Date(ts_ms);
  const formatted = date.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });

  time.innerHTML = `Last Update: ${formatted}`;

  if (diff < TEN_MIN) {
    dot.className = 'status-dot-green';
  } else {
    dot.className = 'status-dot-red';
  }  
}

setInterval(() => {
  if (!document.hidden) {
    load();
  }
}, 5000);
load();

window.addEventListener('storage', function(e) {
  if (e.key === 'users_updated') {
    load();
  }
});

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    document.body.classList.add('paused');
  } else {
    document.body.classList.remove('paused');
  }
});
</script>

</body>
</html>
